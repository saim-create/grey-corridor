<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Soviet Nightmare - Charlie's Axe | NEXUS PLAY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Segoe UI', monospace;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        /* UI Overlays */
        .ui-panel {
            position: absolute;
            z-index: 20;
            font-family: 'Courier New', monospace;
            pointer-events: none;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-left: 3px solid #8b0000;
        }

        #healthBar {
            bottom: 30px;
            left: 20px;
            width: 250px;
        }

        #healthFill {
            height: 12px;
            background: #c0392b;
            width: 100%;
            transition: width 0.2s;
        }

        #stats {
            top: 20px;
            right: 20px;
            text-align: right;
        }

        #inventory {
            bottom: 30px;
            right: 20px;
            text-align: center;
            min-width: 120px;
        }

        .interact-message {
            position: absolute;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            color: #ffcc88;
            padding: 10px 24px;
            font-size: 16px;
            border-radius: 30px;
            font-weight: bold;
            backdrop-filter: blur(8px);
            white-space: nowrap;
            pointer-events: none;
            z-index: 25;
            border: 1px solid #aa6a3a;
        }

        /* Story Modal */
        .story-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            backdrop-filter: blur(5px);
        }

        .story-box {
            background: #1a1410;
            border: 2px solid #6a2a1a;
            padding: 40px 50px;
            max-width: 600px;
            text-align: center;
            color: #d4c4aa;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .story-box h1 {
            color: #aa4a2a;
            margin-bottom: 25px;
            letter-spacing: 3px;
        }

        .story-box p {
            font-size: 18px;
            line-height: 1.6;
            margin: 20px 0;
        }

        .story-box button {
            margin-top: 25px;
            padding: 10px 30px;
            background: #3a2a1a;
            border: 1px solid #8a5a3a;
            color: #eeddbb;
            font-family: monospace;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .story-box button:hover {
            background: #5a3a2a;
            border-color: #cc8844;
        }

        .hidden {
            display: none;
        }

        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121614;
            z-index: 300;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            transition: opacity 1s ease;
            color: #bfb89a;
        }

        .splash-content {
            text-align: center;
        }

        .made-with {
            font-size: 1.1rem;
            letter-spacing: 5px;
            color: #7a9a6a;
        }

        .studio-name {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 4px;
            margin-top: 20px;
        }

        .version-tag {
            position: absolute;
            bottom: 18px;
            right: 22px;
            font-size: 0.65rem;
            color: #5a5e54;
        }

        .fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="ui-panel" id="healthBar">
        ❤️ HEALTH <div id="healthFill"></div>
    </div>
    <div class="ui-panel" id="stats">
        🪓 <span id="axeStatus">NO AXE</span><br>
        🧠 <span id="sanityVal">100</span>%
    </div>
    <div class="ui-panel" id="inventory">
        🎒 INVENTORY<br>
        <span id="invItem">---</span>
    </div>
    <div id="interactMsg" class="interact-message hidden"></div>
</div>

<script>
    (function() {
        // ------------------------- SPLASH SCREEN ---------------------------------
        const splashDiv = document.createElement('div');
        splashDiv.className = 'splash';
        splashDiv.innerHTML = `
            <div class="splash-content">
                <div class="made-with">MADE WITH CODE</div>
                <div class="studio-name">NEXUS PLAY</div>
                <div style="margin-top: 25px; font-size:0.9rem;">SOVIET NIGHTMARE</div>
            </div>
            <div class="version-tag">version 1.0 (build 0423)</div>
        `;
        document.body.appendChild(splashDiv);
        
        setTimeout(() => {
            splashDiv.classList.add('fade-out');
            setTimeout(() => splashDiv.remove(), 1000);
        }, 2600);
        // ------------------------------------------------------------------------
        
        // ------------------------- STORY MODAL -----------------------------------
        const storyModal = document.createElement('div');
        storyModal.className = 'story-modal';
        storyModal.innerHTML = `
            <div class="story-box">
                <h1>🔻 SOVIET NIGHTMARE 🔻</h1>
                <p>Charlie, a young researcher, was investigating abandoned Soviet bunkers in the Ural Mountains. After touching a strange emblem, he blacked out.</p>
                <p>He wakes up in a decaying Soviet-era house. The walls whisper in Russian. Somewhere in the darkness... former officers roam, corrupted by the same curse.</p>
                <p><strong>Find the axe. Survive. Escape.</strong></p>
                <button id="startBtn">✦ WAKE UP, CHARLIE ✦</button>
            </div>
        `;
        document.body.appendChild(storyModal);
        
        let gameStarted = false;
        let audioAllowed = false;
        let audioCtx = null;
        let ambientInterval = null;
        
        document.getElementById('startBtn').addEventListener('click', () => {
            storyModal.remove();
            gameStarted = true;
            initAudioAndGame();
        });
        
        function initAudioAndGame() {
            // Initialize Web Audio at 100% volume
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const masterGain = audioCtx.createGain();
            masterGain.gain.value = 1.0; // 100% volume
            masterGain.connect(audioCtx.destination);
            
            // Ambient scary sounds (Soviet atmosphere)
            ambientInterval = setInterval(() => {
                if (!gameStarted || !audioCtx) return;
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(masterGain);
                osc.type = 'sine';
                osc.frequency.value = 55 + Math.random() * 30;
                gain.gain.value = 0.08;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 3);
                osc.stop(now + 3);
            }, 4500);
            
            // Resume audio context
            audioCtx.resume();
            audioAllowed = true;
            playSfx('wakeup');
            initGame();
        }
        
        function playSfx(type) {
            if (!audioCtx || !audioAllowed) return;
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0.6;
            gainNode.connect(audioCtx.destination);
            const osc = audioCtx.createOscillator();
            osc.connect(gainNode);
            if (type === 'wakeup') {
                osc.frequency.value = 200;
                gainNode.gain.value = 0.3;
                gainNode.gain.exponentialRampToValueAtTime(0.0001, 0.8);
                osc.start();
                osc.stop(0.8);
            } else if (type === 'axe') {
                osc.frequency.value = 340;
                gainNode.gain.value = 0.2;
                gainNode.gain.exponentialRampToValueAtTime(0.0001, 0.4);
                osc.start();
                osc.stop(0.4);
            } else if (type === 'hit') {
                osc.frequency.value = 110;
                gainNode.gain.value = 0.35;
                gainNode.gain.exponentialRampToValueAtTime(0.0001, 0.25);
                osc.start();
                osc.stop(0.25);
            } else if (type === 'footstep') {
                osc.frequency.value = 80;
                gainNode.gain.value = 0.07;
                gainNode.gain.exponentialRampToValueAtTime(0.0001, 0.15);
                osc.start();
                osc.stop(0.15);
            }
        }
        
        // ------------------------- GAME ENGINE -----------------------------------
        const canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d');
        let gameRunning = true;
        
        // Charlie's stats
        let charlie = {
            x: 400, y: 300,
            health: 100,
            sanity: 100,
            hasAxe: false,
            facing: 'down',
            moving: false,
            running: false,
            width: 40,
            height: 50
        };
        
        let enemies = [];
        let axeItem = { x: 700, y: 400, collected: false, active: true };
        let keys = { w: false, s: false, a: false, d: false, shift: false };
        let mouseX = 400, mouseY = 300;
        let attackCooldown = 0;
        let showInteract = false;
        let interactText = "";
        let interactTimer = null;
        let frameCounter = 0;
        
        // Soviet officer enemies
        class SovietOfficer {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 45;
                this.health = 4;
                this.speed = 0.9;
                this.type = 'officer';
                this.attackTimer = 0;
            }
            
            update() {
                const dx = charlie.x - this.x;
                const dy = charlie.y - this.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 0.1) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
            }
            
            draw() {
                ctx.save();
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#5a1a1a';
                // Soviet officer uniform
                ctx.fillStyle = '#3a4a3a';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.size/1.8, this.size/1.4, 0, 0, Math.PI*2);
                ctx.fill();
                // Officer hat
                ctx.fillStyle = '#2a3a2a';
                ctx.fillRect(this.x-20, this.y-28, 40, 20);
                ctx.fillStyle = '#aa3333';
                ctx.fillRect(this.x-12, this.y-30, 24, 10);
                // Face (glowing eyes)
                ctx.fillStyle = '#ff5533';
                ctx.beginPath();
                ctx.arc(this.x-12, this.y-6, 5, 0, Math.PI*2);
                ctx.arc(this.x+12, this.y-6, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x-12, this.y-8, 2, 0, Math.PI*2);
                ctx.arc(this.x+12, this.y-8, 2, 0, Math.PI*2);
                ctx.fill();
                // Soviet shoulder boards
                ctx.fillStyle = '#aa8822';
                ctx.fillRect(this.x-28, this.y+5, 12, 8);
                ctx.fillRect(this.x+16, this.y+5, 12, 8);
                ctx.restore();
            }
            
            takeDamage() {
                this.health--;
                return this.health <= 0;
            }
        }
        
        function spawnOfficers(count) {
            let officers = [];
            for (let i = 0; i < count; i++) {
                let side = Math.floor(Math.random() * 4);
                let x, y;
                if (side === 0) { x = Math.random() * canvas.width; y = -80; }
                else if (side === 1) { x = canvas.width + 80; y = Math.random() * canvas.height; }
                else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + 80; }
                else { x = -80; y = Math.random() * canvas.height; }
                officers.push(new SovietOfficer(x, y));
            }
            return officers;
        }
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            charlie.x = Math.min(Math.max(charlie.x, 40), canvas.width - 40);
            charlie.y = Math.min(Math.max(charlie.y, 60), canvas.height - 60);
            if (axeItem && !axeItem.collected) {
                axeItem.x = Math.min(axeItem.x, canvas.width - 50);
                axeItem.y = Math.min(axeItem.y, canvas.height - 50);
            }
        }
        
        function updateMovement() {
            if (!gameStarted) return;
            let moveX = 0, moveY = 0;
            let speed = charlie.running ? 6.5 : 3.8;
            if (keys.w) moveY -= 1;
            if (keys.s) moveY += 1;
            if (keys.a) moveX -= 1;
            if (keys.d) moveX += 1;
            if (moveX !== 0 || moveY !== 0) {
                const len = Math.hypot(moveX, moveY);
                moveX /= len;
                moveY /= len;
                charlie.moving = true;
                if (frameCounter % 15 === 0) playSfx('footstep');
            } else {
                charlie.moving = false;
            }
            charlie.x += moveX * speed;
            charlie.y += moveY * speed;
            charlie.x = Math.min(Math.max(charlie.x, 35), canvas.width - 35);
            charlie.y = Math.min(Math.max(charlie.y, 55), canvas.height - 55);
            charlie.running = keys.shift && (moveX !== 0 || moveY !== 0);
        }
        
        function attackWithAxe() {
            if (!charlie.hasAxe || attackCooldown > 0) return;
            let hit = false;
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                const dx = mouseX - e.x;
                const dy = mouseY - e.y;
                const dist = Math.hypot(dx, dy);
                if (dist < e.size + 20) {
                    if (e.takeDamage()) {
                        enemies.splice(i, 1);
                        i--;
                        charlie.sanity = Math.min(100, charlie.sanity + 5);
                        updateUI();
                    }
                    hit = true;
                    break;
                }
            }
            if (hit) {
                attackCooldown = 12;
                playSfx('hit');
                ctx.save();
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = '#ffaa66';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.restore();
            }
        }
        
        function takeDamage(amt) {
            if (!gameStarted) return;
            charlie.health -= amt;
            charlie.sanity -= amt * 0.8;
            if (charlie.sanity < 0) charlie.sanity = 0;
            updateUI();
            playSfx('hit');
            // Flash red
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = 0;
            flash.style.left = 0;
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = 'rgba(100,20,0,0.5)';
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = 150;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 120);
            if (charlie.health <= 0) {
                gameStarted = false;
                alert("💀 CHARLIE DIED... The Soviet curse claims another soul. Refresh to try again.");
                location.reload();
            }
        }
        
        function updateUI() {
            document.getElementById('healthFill').style.width = Math.max(0, charlie.health) + '%';
            document.getElementById('axeStatus').innerHTML = charlie.hasAxe ? '🪓 AXE READY' : '❌ NO AXE';
            document.getElementById('sanityVal').innerHTML = Math.floor(charlie.sanity);
            document.getElementById('invItem').innerHTML = charlie.hasAxe ? '🪓 Woodcutter Axe' : '---';
        }
        
        function showMessage(msg, duration) {
            const msgDiv = document.getElementById('interactMsg');
            msgDiv.innerText = msg;
            msgDiv.classList.remove('hidden');
            if (interactTimer) clearTimeout(interactTimer);
            interactTimer = setTimeout(() => msgDiv.classList.add('hidden'), duration);
        }
        
        function drawCharlie() {
            ctx.save();
            ctx.shadowBlur = 0;
            // Charlie's body (full human)
            ctx.fillStyle = '#6a7a6e';
            ctx.beginPath();
            ctx.ellipse(charlie.x, charlie.y-8, 18, 24, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#d4bc8a';
            ctx.beginPath();
            ctx.arc(charlie.x, charlie.y-20, 14, 0, Math.PI*2);
            ctx.fill();
            // Hair
            ctx.fillStyle = '#5a4a3a';
            ctx.fillRect(charlie.x-12, charlie.y-32, 24, 12);
            // Jacket
            ctx.fillStyle = '#4a5a4a';
            ctx.fillRect(charlie.x-18, charlie.y-6, 36, 30);
            // Axe in hand if equipped
            if (charlie.hasAxe) {
                ctx.fillStyle = '#8a6a3a';
                ctx.fillRect(charlie.x+15, charlie.y-12, 28, 8);
                ctx.fillStyle = '#aaaaaa';
                ctx.fillRect(charlie.x+38, charlie.y-15, 12, 14);
            }
            ctx.restore();
        }
        
        function drawAxeItem() {
            if (!axeItem.collected && axeItem.active) {
                ctx.fillStyle = '#b87a3a';
                ctx.shadowBlur = 12;
                ctx.fillRect(axeItem.x-8, axeItem.y-4, 40, 12);
                ctx.fillStyle = '#6a4a2a';
                ctx.fillRect(axeItem.x+10, axeItem.y-12, 12, 28);
                ctx.fillStyle = '#cca86a';
                ctx.font = "bold 24px monospace";
                ctx.fillText("🪓", axeItem.x-6, axeItem.y+4);
                ctx.fillStyle = '#eeddaa';
                ctx.font = "12px monospace";
                ctx.fillText("Soviet Axe", axeItem.x-10, axeItem.y+20);
            }
        }
        
        function checkAxePickup() {
            if (!axeItem.collected && axeItem.active) {
                const dx = charlie.x - axeItem.x;
                const dy = charlie.y - axeItem.y;
                if (Math.hypot(dx, dy) < 45) {
                    showMessage("🔺 Press E to pick up AXE 🔺", 1500);
                    return true;
                }
            }
            return false;
        }
        
        function updateEnemies() {
            for (let i = 0; i < enemies.length; i++) {
                enemies[i].update();
                const dx = charlie.x - enemies[i].x;
                const dy = charlie.y - enemies[i].y;
                const dist = Math.hypot(dx, dy);
                if (dist < enemies[i].size) {
                    takeDamage(14);
                    enemies.splice(i, 1);
                    i--;
                }
            }
            // Spawn more if needed
            if (frameCounter % 140 === 0 && enemies.length < 4 && charlie.hasAxe) {
                enemies.push(...spawnOfficers(1));
            } else if (frameCounter % 200 === 0 && enemies.length < 2 && !charlie.hasAxe) {
                enemies.push(...spawnOfficers(1));
            }
        }
        
        function drawHouseBackground() {
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#1c201a');
            grad.addColorStop(1, '#0e120e');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Wooden floor boards
            ctx.strokeStyle = '#3a362a';
            ctx.lineWidth = 2;
            for (let i = 0; i < canvas.height; i += 48) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            // Window silhouettes
            ctx.fillStyle = '#1e261a';
            ctx.fillRect(60, 40, 100, 80);
            ctx.fillRect(canvas.width-160, 40, 100, 80);
        }
        
        function gameLoop() {
            if (!gameStarted) return;
            updateMovement();
            if (attackCooldown > 0) attackCooldown--;
            updateEnemies();
            checkAxePickup();
            
            // Draw everything
            drawHouseBackground();
            drawAxeItem();
            for (let e of enemies) e.draw();
            drawCharlie();
            
            // Crosshair and flashlight effect
            ctx.strokeStyle = '#ffcc88';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(mouseX-12, mouseY);
            ctx.lineTo(mouseX-4, mouseY);
            ctx.moveTo(mouseX+4, mouseY);
            ctx.lineTo(mouseX+12, mouseY);
            ctx.moveTo(mouseX, mouseY-12);
            ctx.lineTo(mouseX, mouseY-4);
            ctx.moveTo(mouseX, mouseY+4);
            ctx.lineTo(mouseX, mouseY+12);
            ctx.stroke();
            
            frameCounter++;
            requestAnimationFrame(gameLoop);
        }
        
        // Event Listeners
        window.addEventListener('resize', () => { resizeCanvas(); });
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        canvas.addEventListener('click', () => {
            if (!gameStarted) return;
            attackWithAxe();
        });
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
            if (key === 'shift') keys.shift = true;
            if (key === 'e' && !axeItem.collected && axeItem.active) {
                const dx = charlie.x - axeItem.x;
                const dy = charlie.y - axeItem.y;
                if (Math.hypot(dx, dy) < 55) {
                    axeItem.collected = true;
                    charlie.hasAxe = true;
                    playSfx('axe');
                    showMessage("🪓 AXE EQUIPPED! Left click to attack officers.", 2000);
                    updateUI();
                }
            }
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
            if (key === 'shift') keys.shift = false;
        });
        
        function initGame() {
            resizeCanvas();
            charlie.x = canvas.width/2;
            charlie.y = canvas.height/2;
            axeItem = { x: canvas.width-140, y: canvas.height-130, collected: false, active: true };
            enemies = spawnOfficers(2);
            updateUI();
            gameLoop();
            setInterval(() => {
                if (gameStarted) {
                    updateUI();
                }
            }, 100);
            showMessage("🔦 WASD to move, Shift to run, Click to attack with axe", 4000);
        }
        
        // Start audio context on first user interaction
        canvas.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: false });
    })();
</script>
</body>
</html>
