<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grey Corridor - Anny's Nightmare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* UI Panels */
        .ui-panel {
            position: fixed;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 8px 16px;
            font-family: monospace;
            z-index: 20;
            pointer-events: none;
            backdrop-filter: blur(4px);
            border-radius: 8px;
            font-size: 14px;
        }

        #healthBar { bottom: 20px; left: 20px; }
        #stats { top: 20px; right: 20px; }
        #levelInfo { top: 20px; left: 20px; }

        /* Mobile Touch Controls */
        .touch-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .movement-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: rgba(20,20,30,0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa44;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffdd99;
            pointer-events: auto;
            cursor: pointer;
            touch-action: manipulation;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .ctrl-btn:active {
            background: #aa5a2a;
            transform: scale(0.95);
        }

        .attack-btn {
            background: #8a2a1a;
            border-color: #ff6644;
            font-size: 36px;
        }

        .store-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border: 2px solid #ffaa44;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 30;
            pointer-events: auto;
        }

        .message {
            position: fixed;
            bottom: 35%;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            backdrop-filter: blur(10px);
            color: #ffcc88;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 30;
            pointer-events: none;
            white-space: nowrap;
            display: none;
        }

        /* Store Panel */
        .store-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0aea;
            backdrop-filter: blur(12px);
            z-index: 200;
            display: none;
            flex-direction: column;
            overflow-y: auto;
        }

        .store-header {
            background: #1a1410;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #aa6a3a;
            position: sticky;
            top: 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .store-header h1 {
            color: #ffaa66;
            font-size: 20px;
        }

        .coins {
            background: #2a2a1a;
            padding: 6px 15px;
            border-radius: 40px;
            color: #ffcc44;
            font-weight: bold;
        }

        .close-store {
            background: #8a2a1a;
            border: none;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: #1a141080;
            flex-wrap: wrap;
        }

        .cat-btn {
            background: #2a221a;
            border: 1px solid #aa6a3a;
            padding: 6px 15px;
            border-radius: 30px;
            color: #eeddcc;
            cursor: pointer;
            font-size: 12px;
        }

        .cat-btn.active {
            background: #aa5a2a;
            border-color: #ffaa66;
            color: white;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .product-card {
            background: #1a1410cc;
            border: 2px solid #aa6a3a;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            transition: 0.2s;
        }

        .product-card:hover {
            border-color: #ffaa66;
            transform: translateY(-2px);
        }

        .product-name {
            font-size: 14px;
            font-weight: bold;
            color: #ffdd99;
        }

        .product-price {
            font-size: 16px;
            color: #ffcc44;
            font-weight: bold;
            margin: 5px 0;
        }

        .product-quality {
            font-size: 11px;
            color: #bbaa88;
            margin: 5px 0;
        }

        .try-btn, .buy-btn, .equip-btn {
            background: #2a6a8a;
            border: none;
            color: white;
            padding: 6px 15px;
            border-radius: 30px;
            cursor: pointer;
            margin: 5px 3px;
            font-size: 12px;
        }

        .buy-btn { background: #8a2a1a; }
        .equip-btn { background: #2a6a3a; }

        @media (max-width: 600px) {
            .ctrl-btn { width: 60px; height: 60px; font-size: 28px; }
            .store-btn { width: 50px; height: 50px; font-size: 24px; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-panel" id="levelInfo">
        💰 <span id="coinsAmount">500</span> coins<br>
        🗡️ <span id="currentWeaponName">Rusty Axe</span>
    </div>
    <div class="ui-panel" id="healthBar">❤️ ANNY <span id="healthVal">100</span>%</div>
    <div class="ui-panel" id="stats">💀 <span id="kills">0</span> kills</div>

    <div class="store-btn" id="storeBtn">🛒</div>

    <div class="touch-controls">
        <div class="movement-row"><div class="ctrl-btn" id="btnUp">⬆️</div></div>
        <div class="movement-row">
            <div class="ctrl-btn" id="btnLeft">⬅️</div>
            <div class="ctrl-btn" id="btnDown">⬇️</div>
            <div class="ctrl-btn" id="btnRight">➡️</div>
        </div>
        <div class="movement-row"><div class="ctrl-btn attack-btn" id="btnAttack">⚔️</div></div>
    </div>

    <div id="message" class="message"></div>

    <!-- Store Panel -->
    <div class="store-panel" id="storePanel">
        <div class="store-header">
            <h1>🛒 BUNKER STORE 🛒</h1>
            <div class="coins">💰 <span id="storeCoins">500</span></div>
            <button class="close-store" id="closeStoreBtn">✖ CLOSE</button>
        </div>
        <div class="category-tabs" id="categoryTabs"></div>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <script>
        // ------------------------- GAME STATE -------------------------
        let coins = 500;
        let kills = 0;
        let currentLevel = 1;
        let gameRunning = true;
        
        // Player
        let player = {
            x: 400, y: 300, width: 55, height: 85,
            health: 100, maxHealth: 100,
            facing: 'right',
            currentOutfit: "outfit_default",
            currentWeapon: "weapon_axe",
            tryOnOutfit: null
        };
        
        // Weapons
        const weapons = [
            { id: "weapon_axe", name: "Rusty Axe", price: 0, damage: 8, speed: 1.0, quality: "Balanced", owned: true, equipped: true },
            { id: "weapon_knife", name: "Combat Knife", price: 700, damage: 6, speed: 1.5, quality: "Fast +50% speed", owned: false, equipped: false },
            { id: "weapon_hammer", name: "Sledgehammer", price: 1200, damage: 15, speed: 0.6, quality: "High damage -40% speed", owned: false, equipped: false },
            { id: "weapon_sword", name: "Officer Sword", price: 1500, damage: 10, speed: 1.2, quality: "Balanced+", owned: false, equipped: false },
            { id: "weapon_katana", name: "Katana", price: 2000, damage: 12, speed: 1.4, quality: "Sharp & fast +20% dodge", owned: false, equipped: false },
            { id: "weapon_chainsaw", name: "Chainsaw", price: 3000, damage: 20, speed: 0.8, quality: "Brutal power", owned: false, equipped: false },
            { id: "weapon_plasma", name: "Plasma Blade", price: 5000, damage: 18, speed: 1.6, quality: "Legendary speed", owned: false, equipped: false }
        ];
        
        // Outfits (1000-6000 coins)
        const outfits = [
            { id: "outfit_default", name: "Default Outfit", price: 0, owned: true, equipped: true, effect: "Starting outfit" },
            { id: "outfit_jeans_tshirt", name: "Jeans + TShirt", price: 1000, owned: false, equipped: false, effect: "+5% stamina" },
            { id: "outfit_yellow_raincoat", name: "Yellow Raincoat", price: 1000, owned: false, equipped: false, effect: "+15% rain resistance" },
            { id: "outfit_hoodie_trouser", name: "Hoodie + Trouser", price: 1100, owned: false, equipped: false, effect: "+10% defense" },
            { id: "outfit_tracksuit", name: "Tracksuit", price: 1200, owned: false, equipped: false, effect: "+12% speed" },
            { id: "outfit_red_bra", name: "Red Bra + Panty", price: 1200, owned: false, equipped: false, effect: "+10% charm" },
            { id: "outfit_denim_leggings", name: "Denim + Leggings", price: 1300, owned: false, equipped: false, effect: "+8% agility" },
            { id: "outfit_sweater_pants", name: "Sweater + Pants", price: 1400, owned: false, equipped: false, effect: "+15% warmth" },
            { id: "outfit_cardigan_skirt", name: "Cardigan + Skirt", price: 1500, owned: false, equipped: false, effect: "+10% elegance" },
            { id: "outfit_black_abaya", name: "Black Abaya", price: 1500, owned: false, equipped: false, effect: "+15% respect" },
            { id: "outfit_navy_abaya", name: "Navy Blue Abaya", price: 1600, owned: false, equipped: false, effect: "+12% wisdom" },
            { id: "outfit_winter_coat", name: "Winter Coat", price: 1800, owned: false, equipped: false, effect: "+20% cold resistance" },
            { id: "outfit_formal_wear", name: "Formal Wear", price: 2000, owned: false, equipped: false, effect: "+20% authority" },
            { id: "outfit_office_suit", name: "Office Suit", price: 2200, owned: false, equipped: false, effect: "+25% authority" },
            { id: "outfit_purple_night", name: "Purple Night Wear", price: 2500, owned: false, equipped: false, effect: "+15% comfort" },
            { id: "outfit_black_silk_night", name: "Black Silk Night", price: 3000, owned: false, equipped: false, effect: "+18% luxury" },
            { id: "outfit_premium_1", name: "Midnight Lace", price: 4000, owned: false, equipped: false, effect: "+25% allure" },
            { id: "outfit_premium_2", name: "Crimson Queen", price: 5000, owned: false, equipped: false, effect: "+30% domination" },
            { id: "outfit_premium_3", name: "Shadow Empress", price: 6000, owned: false, equipped: false, effect: "+40% shadow power" }
        ];
        
        // Game objects
        let enemies = [];
        let keys = { left: false, right: false, up: false, down: false };
        let attackCooldown = 0;
        let groundY = 500;
        let currentCategory = "All";
        
        // Image loading
        let annyImage = new Image();
        annyImage.src = 'images/outfit_default.png';
        let imageLoaded = false;
        annyImage.onload = () => { imageLoaded = true; };
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function getCurrentWeapon() {
            return weapons.find(w => w.id === player.currentWeapon);
        }
        
        function getDisplayOutfit() {
            return player.tryOnOutfit || player.currentOutfit;
        }
        
        function showMessage(msg, isError = false) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = msg;
            msgDiv.style.color = isError ? "#ff8866" : "#ffcc88";
            msgDiv.style.display = 'block';
            setTimeout(() => msgDiv.style.display = 'none', 2000);
        }
        
        function updateUI() {
            document.getElementById('healthVal').innerText = player.health;
            document.getElementById('kills').innerText = kills;
            document.getElementById('coinsAmount').innerText = coins;
            document.getElementById('storeCoins').innerText = coins;
            const weapon = getCurrentWeapon();
            document.getElementById('currentWeaponName').innerHTML = `${weapon.name} (DMG:${weapon.damage})`;
        }
        
        // TRY ON SYSTEM
        function tryOnOutfit(outfitId, outfitName) {
            player.tryOnOutfit = outfitId;
            showMessage(`🔍 TRYING ON: ${outfitName}`, false);
            // Reload image
            annyImage.src = `images/${outfitId}.png`;
        }
        
        function cancelTryOn() {
            player.tryOnOutfit = null;
            annyImage.src = `images/${player.currentOutfit}.png`;
            showMessage(`👗 Back to ${outfits.find(o => o.id === player.currentOutfit).name}`, false);
        }
        
        // BUY SYSTEM
        function buyItem(type, id, price) {
            if (coins >= price) {
                coins -= price;
                if (type === 'outfit') {
                    const outfit = outfits.find(o => o.id === id);
                    outfit.owned = true;
                    cancelTryOn();
                    showMessage(`✅ Purchased ${outfit.name}! Go to equip.`, false);
                } else {
                    const weapon = weapons.find(w => w.id === id);
                    weapon.owned = true;
                    showMessage(`✅ Purchased ${weapon.name}! Go to equip.`, false);
                }
                updateUI();
                renderStore();
            } else {
                showMessage(`❌ Need ${price - coins} more coins!`, true);
            }
        }
        
        // EQUIP SYSTEM
        function equipItem(type, id) {
            if (type === 'outfit') {
                outfits.forEach(o => o.equipped = false);
                const outfit = outfits.find(o => o.id === id);
                outfit.equipped = true;
                player.currentOutfit = id;
                cancelTryOn();
                showMessage(`✨ ${outfit.name} equipped!`, false);
            } else {
                weapons.forEach(w => w.equipped = false);
                const weapon = weapons.find(w => w.id === id);
                weapon.equipped = true;
                player.currentWeapon = id;
                showMessage(`✨ ${weapon.name} equipped!`, false);
            }
            updateUI();
            renderStore();
        }
        
        // STORE RENDER
        function renderStore() {
            const allItems = [
                ...outfits.map(o => ({ type: 'outfit', ...o })),
                ...weapons.filter(w => !w.owned).map(w => ({ type: 'weapon', ...w }))
            ];
            
            let filtered = allItems;
            if (currentCategory !== "All") {
                filtered = allItems.filter(item => {
                    if (item.type === 'outfit') return item.category === currentCategory;
                    return item.type === currentCategory.toLowerCase();
                });
            }
            
            const container = document.getElementById('productsGrid');
            container.innerHTML = filtered.map(item => `
                <div class="product-card">
                    <div class="product-name">${item.name}</div>
                    <div class="product-price">💰 ${item.price} coins</div>
                    ${item.type === 'weapon' ? `<div class="product-quality">⚔️ ${item.quality} | DMG:${item.damage}</div>` : 
                                              `<div class="product-quality">✨ ${item.effect || 'No effect'}</div>`}
                    <div>
                        <button class="try-btn" onclick="tryOnItem('${item.type}', '${item.id}', '${item.name}')">🔍 TRY</button>
                        ${!item.owned ? `<button class="buy-btn" onclick="buyItem('${item.type}', '${item.id}', ${item.price})">🛒 BUY</button>` : 
                                          `<button class="equip-btn" onclick="equipItem('${item.type}', '${item.id}')">⚔️ EQUIP</button>`}
                    </div>
                    ${item.owned ? `<div style="color:#44ff44; font-size:10px; margin-top:5px;">✓ OWNED${item.equipped ? ' (EQUIPPED)' : ''}</div>` : ''}
                </div>
            `).join('');
        }
        
        function tryOnItem(type, id, name) {
            if (type === 'outfit') {
                tryOnOutfit(id, name);
            } else {
                const weapon = weapons.find(w => w.id === id);
                showMessage(`🔍 ${weapon.name} - ${weapon.quality}`, false);
            }
        }
        
        // ENEMY CLASS
        class Enemy {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.health = 3;
                this.maxHealth = 3;
                this.speed = 1.2;
            }
            update() {
                if (this.x < player.x) this.x += this.speed;
                if (this.x > player.x) this.x -= this.speed;
            }
            draw() {
                ctx.fillStyle = '#2a3a2a';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y + 35, 25, 35, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#ff3333';
                ctx.beginPath();
                ctx.arc(this.x - 12, this.y + 25, 5, 0, Math.PI*2);
                ctx.arc(this.x + 12, this.y + 25, 5, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#330000';
                ctx.fillRect(this.x - 25, this.y - 5, 50, 6);
                ctx.fillStyle = '#00aa00';
                ctx.fillRect(this.x - 25, this.y - 5, 50 * (this.health / this.maxHealth), 6);
            }
            takeDamage(amt) {
                this.health -= amt;
                return this.health <= 0;
            }
        }
        
        // GAME FUNCTIONS
        function drawBackground() {
            ctx.fillStyle = '#1a1e1c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#2a2a22';
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            ctx.fillStyle = '#ffdd44';
            ctx.font = "24px monospace";
            ctx.fillText("☭", canvas.width - 60, 60);
        }
        
        function drawAnny() {
            if (imageLoaded && annyImage.complete && annyImage.naturalWidth > 0) {
                ctx.drawImage(annyImage, player.x - player.width/2, player.y, player.width, player.height);
            } else {
                ctx.fillStyle = '#ff66aa';
                ctx.fillRect(player.x - player.width/2, player.y, player.width, player.height);
                ctx.fillStyle = '#fff';
                ctx.font = "16px monospace";
                ctx.fillText("ANNY", player.x - 20, player.y + 45);
            }
        }
        
        function drawEnemies() { for (let e of enemies) e.draw(); }
        
        function updateMovement() {
            let speed = 3.5;
            if (keys.left) player.x -= speed;
            if (keys.right) player.x += speed;
            if (keys.up && player.y + player.height >= groundY) player.y -= 12;
            if (player.y + player.height < groundY) player.y += 8;
            if (player.y + player.height > groundY) player.y = groundY - player.height;
            player.x = Math.min(Math.max(player.x, 40), canvas.width - 40);
            if (keys.left) player.facing = 'left';
            if (keys.right) player.facing = 'right';
        }
        
        function attack() {
            if (attackCooldown > 0) return;
            const weapon = getCurrentWeapon();
            attackCooldown = Math.floor(18 / weapon.speed);
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                if (Math.abs(player.x - e.x) < 70 && Math.abs(player.y - e.y) < 70) {
                    if (e.takeDamage(weapon.damage)) {
                        enemies.splice(i, 1);
                        kills++;
                        coins += 50;
                        updateUI();
                        showMessage(`💀 Officer defeated! +50 coins`, false);
                    } else {
                        showMessage(`⚔️ ${weapon.name} hit! ${e.health}/${e.maxHealth} left`, false);
                    }
                    break;
                }
            }
            ctx.fillStyle = '#ffaa66';
            ctx.globalAlpha = 0.3;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;
        }
        
        function updateEnemies() {
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                e.update();
                if (Math.abs(player.x - e.x) < 50 && Math.abs(player.y - e.y) < 60) {
                    player.health -= 10;
                    updateUI();
                    enemies.splice(i, 1);
                    i--;
                    if (player.health <= 0) {
                        alert("💀 ANNY DIED! Refresh to play again.");
                        player.health = 100;
                        kills = 0;
                        coins = 500;
                        updateUI();
                        enemies = [];
                        for (let j = 0; j < 3; j++) enemies.push(new Enemy(Math.random() * (canvas.width - 150) + 75, groundY - 50));
                    }
                    showMessage(`💔 You took damage! Health: ${player.health}`, true);
                }
            }
            if (enemies.length === 0) {
                for (let i = 0; i < 4; i++) enemies.push(new Enemy(Math.random() * (canvas.width - 150) + 75, groundY - 50));
                showMessage("🔥 New wave of officers!", false);
            }
        }
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            groundY = canvas.height - 100;
            player.y = groundY - player.height;
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            updateMovement();
            if (attackCooldown > 0) attackCooldown--;
            updateEnemies();
            drawBackground();
            drawEnemies();
            drawAnny();
            requestAnimationFrame(gameLoop);
        }
        
        // Event Listeners
        document.getElementById('btnLeft').onmousedown = () => keys.left = true;
        document.getElementById('btnLeft').ontouchstart = () => keys.left = true;
        document.getElementById('btnRight').onmousedown = () => keys.right = true;
        document.getElementById('btnRight').ontouchstart = () => keys.right = true;
        document.getElementById('btnUp').onmousedown = () => keys.up = true;
        document.getElementById('btnUp').ontouchstart = () => keys.up = true;
        document.getElementById('btnDown').onmousedown = () => keys.down = true;
        document.getElementById('btnDown').ontouchstart = () => keys.down = true;
        
        document.getElementById('btnLeft').onmouseup = () => keys.left = false;
        document.getElementById('btnLeft').ontouchend = () => keys.left = false;
        document.getElementById('btnRight').onmouseup = () => keys.right = false;
        document.getElementById('btnRight').ontouchend = () => keys.right = false;
        document.getElementById('btnUp').onmouseup = () => keys.up = false;
        document.getElementById('btnUp').ontouchend = () => keys.up = false;
        document.getElementById('btnDown').onmouseup = () => keys.down = false;
        document.getElementById('btnDown').ontouchend = () => keys.down = false;
        
        document.getElementById('btnAttack').onclick = () => attack();
        document.getElementById('btnAttack').ontouchstart = () => attack();
        
        document.getElementById('storeBtn').onclick = () => {
            document.getElementById('storePanel').style.display = 'flex';
            renderStore();
        };
        document.getElementById('closeStoreBtn').onclick = () => {
            document.getElementById('storePanel').style.display = 'none';
            cancelTryOn();
        };
        
        window.addEventListener('resize', resizeCanvas);
        
        // Make functions global for HTML buttons
        window.tryOnItem = tryOnItem;
        window.buyItem = buyItem;
        window.equipItem = equipItem;
        
        // Initialize
        for (let i = 0; i < 3; i++) enemies.push(new Enemy(Math.random() * (canvas.width - 150) + 75, groundY - 50));
        resizeCanvas();
        updateUI();
        gameLoop();
        showMessage("🎮 Touch buttons = Move | ⚔️ = Attack | 🛒 = Store | TRY outfits before buying!", false);
    </script>
</body>
</html>
