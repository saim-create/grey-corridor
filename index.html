<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Grey Corridor - Anny</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; touch-action: manipulation; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }
        
        .ui-panel {
            position: fixed; background: rgba(0,0,0,0.85); color: white; padding: 6px 12px;
            font-family: monospace; z-index: 20; pointer-events: none; backdrop-filter: blur(4px); border-radius: 8px; font-size: 12px;
        }
        #healthBar { bottom: 20px; left: 20px; }
        #stats { top: 20px; right: 20px; }
        #levelInfo { top: 20px; left: 20px; }
        
        .touch-controls {
            position: fixed; bottom: 20px; right: 20px; z-index: 30;
            display: flex; flex-direction: column; gap: 12px; pointer-events: none;
        }
        .movement-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .ctrl-btn {
            width: 70px; height: 70px; background: rgba(20,20,30,0.9); backdrop-filter: blur(8px);
            border: 2px solid #ffaa44; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 32px; color: #ffdd99; pointer-events: auto; cursor: pointer;
        }
        .ctrl-btn:active { background: #aa5a2a; transform: scale(0.95); }
        .attack-btn { background: #8a2a1a; border-color: #ff6644; font-size: 36px; }
        .store-btn {
            position: fixed; bottom: 20px; left: 20px; width: 50px; height: 50px;
            background: rgba(0,0,0,0.8); border: 2px solid #ffaa44; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; z-index: 30;
        }
        .message {
            position: fixed; bottom: 35%; left: 50%; transform: translateX(-50%);
            background: #000000cc; color: #ffcc88; padding: 8px 16px; border-radius: 40px;
            font-size: 12px; z-index: 30; pointer-events: none; white-space: nowrap; display: none;
        }
        .restart-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000ee;
            z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
        }
        .restart-overlay h1 { color: #ff5533; font-size: 36px; }
        .restart-overlay button {
            background: #8a2a1a; border: 2px solid #ffaa44; color: white;
            padding: 12px 30px; font-size: 20px; cursor: pointer; border-radius: 40px;
        }
        
        /* Store Panel */
        .store-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0aea; backdrop-filter: blur(12px); z-index: 200;
            display: none; flex-direction: column; overflow-y: auto;
        }
        .store-header {
            background: #1a1410; padding: 15px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid #ffaa44; position: sticky; top: 0;
            flex-wrap: wrap; gap: 10px;
        }
        .store-header h1 { color: #ffaa66; font-size: 20px; }
        .coins { background: #2a2a1a; padding: 6px 15px; border-radius: 40px; color: #ffcc44; font-weight: bold; }
        .close-store { background: #8a2a1a; border: none; color: white; padding: 6px 20px; border-radius: 40px; cursor: pointer; }
        .category-tabs { display: flex; gap: 10px; padding: 12px; background: #1a141080; flex-wrap: wrap; }
        .cat-btn {
            background: #2a221a; border: 1px solid #aa6a3a; padding: 6px 15px; border-radius: 30px;
            color: #eeddcc; cursor: pointer; font-size: 12px;
        }
        .cat-btn.active { background: #aa5a2a; border-color: #ffaa66; color: white; }
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px; padding: 20px;
        }
        .product-card {
            background: #1a1410cc; border: 2px solid #aa6a3a; border-radius: 16px;
            padding: 12px; text-align: center; cursor: pointer;
        }
        .product-name { font-size: 14px; font-weight: bold; color: #ffdd99; }
        .product-price { font-size: 16px; color: #ffcc44; font-weight: bold; margin: 5px 0; }
        .product-effect { font-size: 11px; color: #bbaa88; margin: 5px 0; }
        .try-btn, .buy-btn, .equip-btn {
            background: #2a6a8a; border: none; color: white; padding: 5px 12px;
            border-radius: 30px; cursor: pointer; margin: 3px; font-size: 11px;
        }
        .buy-btn { background: #8a2a1a; }
        .equip-btn { background: #2a6a3a; }
        
        @media (max-width: 600px) {
            .ctrl-btn { width: 55px; height: 55px; font-size: 24px; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="ui-panel" id="levelInfo">💰 <span id="coinsAmount">500</span><br>🗡️ <span id="currentWeaponName">Axe</span></div>
    <div class="ui-panel" id="healthBar">❤️ <span id="healthVal">100</span>%</div>
    <div class="ui-panel" id="stats">💀 <span id="kills">0</span></div>
    <div class="store-btn" id="storeBtn">🛒</div>
    
    <div class="touch-controls">
        <div class="movement-row"><div class="ctrl-btn" id="btnUp">⬆️</div></div>
        <div class="movement-row">
            <div class="ctrl-btn" id="btnLeft">⬅️</div>
            <div class="ctrl-btn" id="btnDown">⬇️</div>
            <div class="ctrl-btn" id="btnRight">➡️</div>
        </div>
        <div class="movement-row"><div class="ctrl-btn attack-btn" id="btnAttack">⚔️</div></div>
    </div>
    <div id="message" class="message"></div>
    <div class="restart-overlay" id="restartOverlay">
        <h1>💀 ANNY DIED 💀</h1>
        <button id="restartBtn">🔄 PLAY AGAIN</button>
    </div>

    <div class="store-panel" id="storePanel">
        <div class="store-header">
            <h1>🛒 BUNKER STORE 🛒</h1>
            <div class="coins">💰 <span id="storeCoins">500</span></div>
            <button class="close-store" id="closeStoreBtn">✖ CLOSE</button>
        </div>
        <div class="category-tabs" id="categoryTabs"></div>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <script>
        // Game state
        let coins = 500;
        let kills = 0;
        let gameRunning = true;
        
        // Player - HUMAN ANNY
        let player = {
            x: 400, y: 300, width: 50, height: 85,
            health: 100, facing: 'right',
            velocityY: 0, runCycle: 0,
            currentOutfit: "outfit_default"
        };
        
        let keys = { left: false, right: false, up: false };
        let groundY = 550;
        let enemies = [];
        let attackCooldown = 0;
        let currentCategory = "All";
        
        // BACKGROUND IMAGE - aapki generate ki hui image
        let bgImage = new Image();
        bgImage.src = 'images/store_interior.png';
        let bgLoaded = false;
        bgImage.onload = () => { bgLoaded = true; };
        
        // Outfits
        const outfits = [
            { id: "outfit_default", name: "Default Outfit", price: 0, owned: true, equipped: true, effect: "Starting outfit", emoji: "👗" },
            { id: "outfit_jeans_tshirt", name: "Jeans + TShirt", price: 1000, owned: false, equipped: false, effect: "+5% stamina", emoji: "👖" },
            { id: "outfit_yellow_raincoat", name: "Yellow Raincoat", price: 1000, owned: false, equipped: false, effect: "+15% rain resistance", emoji: "🌧️" },
            { id: "outfit_hoodie_trouser", name: "Hoodie + Trouser", price: 1100, owned: false, equipped: false, effect: "+10% defense", emoji: "🧥" },
            { id: "outfit_tracksuit", name: "Tracksuit", price: 1200, owned: false, equipped: false, effect: "+12% speed", emoji: "🏃" },
            { id: "outfit_red_bra", name: "Red Bra + Panty", price: 1200, owned: false, equipped: false, effect: "+10% charm", emoji: "❤️" },
            { id: "outfit_black_abaya", name: "Black Abaya", price: 1500, owned: false, equipped: false, effect: "+15% respect", emoji: "🕌" },
            { id: "outfit_navy_abaya", name: "Navy Abaya", price: 1600, owned: false, equipped: false, effect: "+12% wisdom", emoji: "💙" },
            { id: "outfit_winter_coat", name: "Winter Coat", price: 1800, owned: false, equipped: false, effect: "+20% cold resistance", emoji: "❄️" },
            { id: "outfit_purple_night", name: "Purple Night Wear", price: 2500, owned: false, equipped: false, effect: "+15% comfort", emoji: "🟣" },
            { id: "outfit_black_silk_night", name: "Black Silk Night", price: 3000, owned: false, equipped: false, effect: "+18% luxury", emoji: "⚫" },
            { id: "outfit_premium_1", name: "Midnight Lace", price: 4000, owned: false, equipped: false, effect: "+25% allure", emoji: "🌙" },
            { id: "outfit_premium_2", name: "Crimson Queen", price: 5000, owned: false, equipped: false, effect: "+30% domination", emoji: "👑" },
            { id: "outfit_premium_3", name: "Shadow Empress", price: 6000, owned: false, equipped: false, effect: "+40% shadow power", emoji: "🌑" }
        ];
        
        function updateUI() {
            document.getElementById('healthVal').innerText = player.health;
            document.getElementById('kills').innerText = kills;
            document.getElementById('coinsAmount').innerText = coins;
            document.getElementById('storeCoins').innerText = coins;
        }
        
        function showMessage(msg, isError = false) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = msg;
            msgDiv.style.color = isError ? "#ff8866" : "#ffcc88";
            msgDiv.style.display = 'block';
            setTimeout(() => msgDiv.style.display = 'none', 1500);
        }
        
        // TRY ON - changes player's outfit temporarily
        function tryOnOutfit(outfitId, outfitName) {
            player.currentOutfit = outfitId;
            showMessage(`🔍 TRYING ON: ${outfitName}`, false);
        }
        
        function buyOutfit(outfitId, price) {
            if (coins >= price) {
                coins -= price;
                const outfit = outfits.find(o => o.id === outfitId);
                outfit.owned = true;
                updateUI();
                renderStore();
                showMessage(`✅ Purchased ${outfit.name}!`, false);
            } else {
                showMessage(`❌ Need ${price - coins} more coins!`, true);
            }
        }
        
        function equipOutfit(outfitId) {
            outfits.forEach(o => o.equipped = false);
            const outfit = outfits.find(o => o.id === outfitId);
            outfit.equipped = true;
            player.currentOutfit = outfitId;
            updateUI();
            renderStore();
            showMessage(`✨ ${outfit.name} equipped!`, false);
        }
        
        function renderStore() {
            let filtered = outfits;
            const container = document.getElementById('productsGrid');
            container.innerHTML = filtered.map(outfit => `
                <div class="product-card">
                    <div class="product-name">${outfit.name}</div>
                    <div class="product-price">💰 ${outfit.price} coins</div>
                    <div class="product-effect">✨ ${outfit.effect}</div>
                    <div>
                        <button class="try-btn" onclick="tryOnOutfit('${outfit.id}', '${outfit.name}')">🔍 TRY</button>
                        ${!outfit.owned ? `<button class="buy-btn" onclick="buyOutfit('${outfit.id}', ${outfit.price})">🛒 BUY</button>` : 
                                          `<button class="equip-btn" onclick="equipOutfit('${outfit.id}')">⚔️ EQUIP</button>`}
                    </div>
                    ${outfit.owned ? `<div style="color:#44ff44; font-size:10px; margin-top:5px;">✓ OWNED ${outfit.equipped ? '(EQUIPPED)' : ''}</div>` : ''}
                </div>
            `).join('');
        }
        
        // DRAW BACKGROUND - aapki image se
        function drawBackground() {
            if (bgLoaded && bgImage.complete && bgImage.naturalWidth > 0) {
                ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            } else {
                // Fallback gradient
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, '#1a1e1c');
                grad.addColorStop(1, '#0a0c0a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#2a2a22';
                ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
                ctx.fillStyle = '#ffdd44';
                ctx.font = "30px monospace";
                ctx.fillText("☭", canvas.width - 60, 60);
            }
        }
        
        // DRAW HUMAN ANNY (with outfit emoji)
        function drawAnny() {
            const outfit = outfits.find(o => o.id === player.currentOutfit);
            
            // Body
            ctx.fillStyle = '#ff99cc';
            ctx.fillRect(player.x - player.width/2, player.y, player.width, player.height);
            
            // Head
            ctx.fillStyle = '#f4d0b5';
            ctx.beginPath();
            ctx.arc(player.x, player.y + 18, 18, 0, Math.PI*2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x - 8, player.y + 12, 4, 4);
            ctx.fillRect(player.x + 4, player.y + 12, 4, 4);
            
            // Hair
            ctx.fillStyle = '#5a3a2a';
            ctx.fillRect(player.x - 18, player.y + 2, 36, 15);
            
            // LEGS (running animation)
            let legOffset = Math.sin(player.runCycle * 2) * 12;
            ctx.fillStyle = '#c49a6c';
            ctx.fillRect(player.x - 12, player.y + 60, 12, 25 + legOffset);
            ctx.fillRect(player.x + 0, player.y + 60, 12, 25 - legOffset);
            
            // SKIRT
            if (outfit && (outfit.id === "outfit_default" || outfit.id === "outfit_cardigan_skirt")) {
                ctx.fillStyle = '#ff99cc';
                ctx.fillRect(player.x - 18, player.y + 50, 36, 12);
            }
            
            // Outfit emoji on chest
            ctx.font = "20px monospace";
            ctx.fillText(outfit?.emoji || "👗", player.x - 10, player.y + 35);
            
            // Weapon when attacking
            if (attackCooldown > 0) {
                ctx.fillStyle = '#8a6a3a';
                ctx.fillRect(player.x + 20, player.y + 35, 35, 8);
                ctx.fillStyle = '#aaa';
                ctx.fillRect(player.x + 50, player.y + 30, 12, 18);
            }
        }
        
        // Enemy class
        class Enemy {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.health = 3; this.maxHealth = 3;
                this.speed = 1.2; this.runCycle = 0;
            }
            update() {
                if (this.x < player.x) this.x += this.speed;
                if (this.x > player.x) this.x -= this.speed;
                this.runCycle += 0.2;
                this.x = Math.min(Math.max(this.x, 30), canvas.width - 30);
            }
            draw() {
                ctx.fillStyle = '#2a3a2a';
                ctx.beginPath();
                ctx.ellipse(this.x, this.y + 35, 22, 35, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#1a2a1a';
                ctx.fillRect(this.x - 20, this.y + 5, 40, 15);
                ctx.fillStyle = '#ff3333';
                ctx.beginPath();
                ctx.arc(this.x - 10, this.y + 22, 5, 0, Math.PI*2);
                ctx.arc(this.x + 10, this.y + 22, 5, 0, Math.PI*2);
                ctx.fill();
                // Legs moving
                let legOffset = Math.sin(this.runCycle * 2) * 10;
                ctx.fillStyle = '#2a3a2a';
                ctx.fillRect(this.x - 14, this.y + 55, 10, 20 + legOffset);
                ctx.fillRect(this.x + 4, this.y + 55, 10, 20 - legOffset);
                // Health bar
                ctx.fillStyle = '#330000';
                ctx.fillRect(this.x - 22, this.y - 5, 44, 4);
                ctx.fillStyle = '#00aa00';
                ctx.fillRect(this.x - 22, this.y - 5, 44 * (this.health/this.maxHealth), 4);
            }
            takeDamage(amt) { this.health -= amt; return this.health <= 0; }
        }
        
        function updateMovement() {
            let speed = 3.5;
            let moving = false;
            if (keys.left) { player.x -= speed; moving = true; player.facing = 'left'; }
            if (keys.right) { player.x += speed; moving = true; player.facing = 'right'; }
            if (moving && player.y + player.height >= groundY) { player.runCycle += 0.25; } 
            else { player.runCycle *= 0.95; }
            if (keys.up && player.y + player.height >= groundY) { player.velocityY = -11; }
            player.velocityY += 0.7;
            player.y += player.velocityY;
            if (player.y + player.height >= groundY) {
                player.y = groundY - player.height;
                player.velocityY = 0;
            }
            player.x = Math.min(Math.max(player.x, 40), canvas.width - 40);
        }
        
        function attack() {
            if (attackCooldown > 0) return;
            attackCooldown = 18;
            for (let i = 0; i < enemies.length; i++) {
                if (Math.abs(player.x - enemies[i].x) < 60 && Math.abs(player.y - enemies[i].y) < 60) {
                    if (enemies[i].takeDamage(10)) {
                        enemies.splice(i, 1);
                        kills++; coins += 50;
                        updateUI();
                        showMessage("💀 Officer defeated! +50 coins");
                    } else { showMessage("⚔️ Hit!"); }
                    break;
                }
            }
        }
        
        function updateEnemies() {
            for (let i = 0; i < enemies.length; i++) {
                enemies[i].update();
                if (Math.abs(player.x - enemies[i].x) < 45 && Math.abs(player.y - enemies[i].y) < 55) {
                    player.health -= 10;
                    updateUI();
                    enemies.splice(i, 1);
                    i--;
                    if (player.health <= 0) gameOver();
                    showMessage("💔 You took damage!", true);
                }
            }
            if (enemies.length === 0 && gameRunning) {
                for (let i = 0; i < 3; i++) {
                    enemies.push(new Enemy(Math.random() * (canvas.width - 150) + 75, groundY - 50));
                }
                showMessage("🔥 New wave of officers!");
            }
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('restartOverlay').style.display = 'flex';
        }
        
        function restartGame() {
            gameRunning = true;
            player.health = 100; kills = 0; coins = 500;
            player.x = canvas.width / 2;
            updateUI();
            enemies = [];
            for (let i = 0; i < 3; i++) enemies.push(new Enemy(Math.random() * (canvas.width - 150) + 75, groundY - 50));
            document.getElementById('restartOverlay').style.display = 'none';
        }
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            groundY = canvas.height - 100;
            player.y = groundY - player.height;
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            updateMovement();
            if (attackCooldown > 0) attackCooldown--;
            updateEnemies();
            drawBackground();
            for (let e of enemies) e.draw();
            drawAnny();
            requestAnimationFrame(gameLoop);
        }
        
        // Event listeners
        document.getElementById('btnLeft').ontouchstart = () => keys.left = true;
        document.getElementById('btnLeft').onmousedown = () => keys.left = true;
        document.getElementById('btnRight').ontouchstart = () => keys.right = true;
        document.getElementById('btnRight').onmousedown = () => keys.right = true;
        document.getElementById('btnUp').ontouchstart = () => keys.up = true;
        document.getElementById('btnUp').onmousedown = () => keys.up = true;
        
        document.getElementById('btnLeft').ontouchend = () => keys.left = false;
        document.getElementById('btnLeft').onmouseup = () => keys.left = false;
        document.getElementById('btnRight').ontouchend = () => keys.right = false;
        document.getElementById('btnRight').onmouseup = () => keys.right = false;
        document.getElementById('btnUp').ontouchend = () => keys.up = false;
        document.getElementById('btnUp').onmouseup = () => keys.up = false;
        
        document.getElementById('btnAttack').onclick = () => attack();
        document.getElementById('btnAttack').ontouchstart = () => attack();
        document.getElementById('storeBtn').onclick = () => { document.getElementById('storePanel').style.display = 'flex'; renderStore(); };
        document.getElementById('closeStoreBtn').onclick = () => { document.getElementById('storePanel').style.display = 'none'; };
        document.getElementById('restartBtn').onclick = () => restartGame();
        
        window.addEventListener('resize', resizeCanvas);
        window.tryOnOutfit = tryOnOutfit;
        window.buyOutfit = buyOutfit;
        window.equipOutfit = equipOutfit;
        
        for (let i = 0; i < 3; i++) enemies.push(new Enemy(Math.random() * (canvas.width - 150) + 75, groundY - 50));
        resizeCanvas();
        updateUI();
        gameLoop();
        showMessage("🎮 Left/Right = Move | Up = Jump | Attack = Hit officers!", 3000);
    </script>
</body>
</html>
